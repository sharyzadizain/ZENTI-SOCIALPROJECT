services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: zenti-socialproject:local
    container_name: zenti-socialproject
    restart: unless-stopped
    env_file:
      - ./back/.env.crash
      - ./my-nuxtor-app/.env.crash
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      DATABASE_CLIENT: sqlite
      DATABASE_FILENAME: .tmp/data.db
      NUXT_BACK_SQLITE_PATH: /app/back/.tmp/data.db
    ports:
      - "${BACKEND_PORT:-1337}:1337"
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - strapi-db:/app/back/.tmp
      - strapi-uploads:/app/back/public/uploads

volumes:
  strapi-db:
  strapi-uploads:
